<!DOCTYPE html>
<html>
<head>
<title>SecondFlow</title>

<link rel="stylesheet" href="task2.css">

</head>

<body>




<section class="hero">


<h1>SecondFlow</h1>

<p>Measure time. Record moments.</p>



<div class="card">


<div class="circle">


<div class="clock">
⏱
</div>


<div id="display">
00 : 00 : 00
</div>


<div class="labels">

<span>HOURS</span>
<span>MINUTES</span>
<span>SECONDS</span>

</div>


</div>



<div class="buttons">


<button class="start" onclick="start()">
▶ Start
</button>


<button class="pause" onclick="pause()">
Ⅱ Pause
</button>


<button class="reset" onclick="reset()">
⟳ Reset
</button>


<button class="lap" onclick="lap()">
⚑ Lap
</button>


</div>



</div>





<div class="laps-box">


<h3>
⏱ Lap Times
<button onclick="clearLaps()">Clear All</button>
</h3>


<ul id="laps">

</ul>


</div>



</section>



<script src="task2.js"></script>


</body>
</html>
